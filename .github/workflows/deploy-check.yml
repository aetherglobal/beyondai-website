name: Deploy Gate

on:
  pull_request:
    branches: [main]

jobs:
  source-branch-check:
    name: Source Branch Check
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from staging branch
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "::error::PRs to main must come from the 'staging' branch. Got '${{ github.head_ref }}' instead."
            echo ""
            echo "Follow the branching workflow: dev → staging → main"
            exit 1
          fi
          echo "Source branch is 'staging' — proceeding."
