        - paragraph [ref=e34]: Beyond AI is an ongoing initiative that facilitates critical conversations between policymakers, technologists, academics, and civil society about the role of artificial intelligence in Africa. Through research, forums, storytelling, and our annual Nyansa Futures conference, we aim to shape an AI future that serves the public good.
